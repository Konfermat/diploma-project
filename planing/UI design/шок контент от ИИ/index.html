<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн Курс</title>
    <!-- Подключение внешнего файла стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="course-title">Загрузка курса...</h1>
        <p class="course-desc" id="course-desc"></p>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Уроки курса</h3>
            <ul class="step-list" id="step-list"></ul>
        </aside>

        <main class="content" id="lesson-content">
            <!-- Сюда скрипт подставит элементы выбранного урока -->
        </main>
    </div>

    <script>
        // Данные из вашего API
        const apiData = [{"id":1,"title":"Поколение Python","description":"В курсе рассказывается об основных типах данных, конструкциях и принципах структурного программирования языка Python. Курс содержит теорию в формате текстовых конспектов и более 500 задач с автоматизированной проверкой.","created_at":"2026-06-10T06:00:23.424881Z","steps":[{"id":1,"course":1,"title":"Урок 1: Введение и основы","order":1,"elements":[{"id":1,"step":1,"order":1,"step_element_type":"TEXT","text_content":{"body":"### Теория к уроку\n\nВ этом уроке мы разберем базовые концепции. Python — это высокоуровневый язык программирования, который отлично подходит для новичков благодаря простому синтаксису."},"test_content":null},{"id":2,"step":1,"order":2,"step_element_type":"TEST","text_content":null,"test_content":{"question":"Вопрос по теме урока: Сколько будет 5 + 3?","options":[{"answer":"Правильный ответ (8)","is_correct":true},{"answer":"Неправильный вариант А (7)","is_correct":false},{"answer":"Неправильный вариант Б (9)","is_correct":false}]}},{"id":3,"step":1,"order":3,"step_element_type":"TEXT","text_content":{"body":"### Дополнительный материал\n\nНе забывайте практиковаться после каждого теста, чтобы закрепить материал на практике."},"test_content":null}]}]}];

        const course = apiData[0];
        let currentStepId = course.steps[0].id;

        // Инициализация шапки
        document.getElementById('course-title').innerText = course.title;
        document.getElementById('course-desc').innerText = course.description;

        // Рендер меню
        function renderSidebar() {
            const sidebarContainer = document.getElementById('step-list');
            sidebarContainer.innerHTML = '';
            
            course.steps.forEach(step => {
                const li = document.createElement('li');
                li.className = `step-item ${step.id === currentStepId ? 'active' : ''}`;
                li.innerText = step.title;
                li.onclick = () => {
                    currentStepId = step.id;
                    renderSidebar();
                    renderContent();
                };
                sidebarContainer.appendChild(li);
            });
        }

        // Парсер простого Markdown (для заголовков)
        function parseMarkdown(text) {
            return text.replace(/^### (.*$)/gim, '<h3>$1</h3>').replace(/\n/g, '<br>');
        }

        // Рендер содержимого урока
        function renderContent() {
            const contentContainer = document.getElementById('lesson-content');
            contentContainer.innerHTML = '';

            const currentStep = course.steps.find(s => s.id === currentStepId);
            if (!currentStep) return;

            // Сортируем элементы по порядку order
            const sortedElements = currentStep.elements.sort((a, b) => a.order - b.order);

            sortedElements.forEach(el => {
                const elementDiv = document.createElement('div');
                elementDiv.className = 'element';

                if (el.step_element_type === 'TEXT' && el.text_content) {
                    elementDiv.className += ' theory-block';
                    elementDiv.innerHTML = parseMarkdown(el.text_content.body);
                } 
                
                else if (el.step_element_type === 'TEST' && el.test_content) {
                    elementDiv.className += ' test-block';
                    
                    const test = el.test_content;
                    let optionsHtml = '';
                    
                    test.options.forEach((opt, idx) => {
                        optionsHtml += `
                            <label class="option-label">
                                <input type="radio" name="test-${el.id}" value="${opt.is_correct}">
                                ${opt.answer}
                            </label>
                        `;
                    });

                    elementDiv.innerHTML = `
                        <div class="test-question">${test.question}</div>
                        <div class="options-list">${optionsHtml}</div>
                        <button class="btn-check" onclick="checkAnswer(${el.id})">Проверить ответ</button>
                        <div class="feedback" id="feedback-${el.id}"></div>
                    `;
                }

                contentContainer.appendChild(elementDiv);
            });
        }

        // Функция проверки теста
        window.checkAnswer = function(elementId) {
            const selected = document.querySelector(`input[name="test-${elementId}"]:checked`);
            const feedback = document.getElementById(`feedback-${elementId}`);
            
            if (!selected) {
                feedback.className = 'feedback error';
                feedback.innerText = 'Пожалуйста, выберите вариант ответа.';
                return;
            }

            const isCorrect = selected.value === 'true';
            if (isCorrect) {
                feedback.className = 'feedback success';
                feedback.innerText = 'Правильно! Отличный результат.';
            } else {
                feedback.className = 'feedback error';
                feedback.innerText = 'Неверно. Попробуйте еще раз.';
            }
        };

        // Старт
        renderSidebar();
        renderContent();
    </script>
</body>
</html>
