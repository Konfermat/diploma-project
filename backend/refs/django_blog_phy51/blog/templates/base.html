<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
        <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md-sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <a href="{% url 'post_list' %}" class="text-2xl font-black text-emerald-400">DEV FLOW</a>
                <div class="flex items-center gap-6 text-sm font-medium">
                <a href="{% url 'post_list' %}" class="hover:text-emerald-400 transition-colors">Лента</a>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="hover:text-emerald-400 transition-colors">Профиль</a>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-slate-800 hover:bg-rose-500/20 hover:text-rose-400 px-4 py-2 rounded-lg transition-all">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'register' %}" class="hover:text-emerald-400 transition-colors">Регистрация</a>
                <a href="{% url 'login' %}" class="hover:text-emerald-400 transition-colors">Войти</a>
            {% endif %}
             </div>
            </div>
        </nav>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
