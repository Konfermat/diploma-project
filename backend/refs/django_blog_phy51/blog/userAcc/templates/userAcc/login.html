{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
{% if messages %}
    {% for message in messages %}
        <div style="color: red;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    <h1>Вход в аккаунт</h1>
    <form method="post">
        {% csrf_token %}
        {{ form }}
        <button type="submit">Войти</button>
    </form>
<span>Еще нет аккаунта?<a href="{% url 'register' %}">
    Зарегистрироваться
</a> </span>
{% endblock %}
